    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: white; padding: 20px; text-align: center; }
        .btn-container { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        .btn { background: #ff6700; color: white; text-decoration: none; padding: 18px; border-radius: 12px; font-weight: bold; font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: block; }
        .btn:active { background: #cf5300; }
        #installBtn { background: #28a745; display: none; margin: 20px auto; padding: 12px 24px; border: none; color: white; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Launcher Progresivo (Todo en Uno) 🚀</h2>
    <p>Sube este único archivo a GitHub para instalarlo como App nativa.</p>
    
    <button id="installBtn">📥 Instalar Aplicación</button>

    <div class="btn-container">
        <!-- Enlaces de actividades nativas de Android -->
        <a class="btn" href="intent:#Intent;launchFlags=0x10000000;component=com.android.settings/.Settings$PowerUsageSummaryActivity;end">🔋 Uso de Batería</a>
        <a class="btn" href="intent:#Intent;launchFlags=0x10000000;component=com.android.settings/.Settings$BatterySaverSettingsActivity;end">⚡ Ahorro de Energía</a>
        <a class="btn" href="intent:#Intent;launchFlags=0x10000000;component=com.android.settings/.Settings;end">⚙️ Ajustes Generales</a>
    </div>

    <script>
        // TRUCO 2: Inyectar el Service Worker (sw.js) como un Blob de texto en línea
        if ('serviceWorker' in navigator) {
            const swCode = "self.addEventListener('fetch', function(event) { event.respondWith(fetch(event.request)); });";
            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);
            
            navigator.serviceWorker.register(swUrl, { scope: './' })
            .then(() => console.log("Service Worker inyectado correctamente"))
            .catch(err => console.log("Error de Service Worker:", err));
        }

        // Lógica del botón de instalación de la aplicación
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').style.display = 'block';
        });

        document.getElementById('installBtn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('installBtn').style.display = 'none';
                }
                deferredPrompt = null;
            }
        });
    </script>
</body>
</html>
